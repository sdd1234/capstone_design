server:
  port: 8080

spring:
  application:
    name: campus-fit-api

  # ── MySQL ────────────────────────────────────────────────────────
  datasource:
    url: jdbc:mysql://localhost:3306/campusfit?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: campus_user
    password: campus_pass

  # ── H2 (개발 전용, 필요 시 아래 주석 해제) ────────────────────────
  # datasource:
  #   url: jdbc:h2:file:./h2data/campusfit;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE
  #   driver-class-name: org.h2.Driver
  #   username: sa
  #   password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        globally_quoted_identifiers: true

    open-in-view: false

  h2:
    console:
      enabled: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB

app:
  cors:
    allowed-origins:
      - http://localhost:5173
  jwt:
    issuer: campus-fit
    secret: "campus-fit-jwt-secret-key-minimum-256-bits-long-please-change"
    access-token-minutes: 30
    refresh-token-days: 14
  file:
    upload-dir: uploads/
  excel:
    import-dir: ../excel # 프로젝트 루트의 excel/ 폴더 (mvn 실행 디렉터리 기준)
